<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ファミマ行脚</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/map.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/list.css">
<link rel="stylesheet" href="css/about.css">
</head>

<body>
<div id="map"></div>

<button id="listBtn" class="menu-btn">≡</button>
<button id="locateBtn" class="locate-btn">📍</button>

<div id="listPanel" class="list-panel">
  <div class="list-header">
    <span>行脚店舗一覧</span>
    <button id="aboutBtn" class="about-btn">about</button>
    <button id="listClose" class="close-btn">×</button>
  </div>

  <div class="year-tabs">
    <button data-year="all" class="active">all</button>
    <button data-year="2011">2011</button>
    <button data-year="2012">2012</button>
    <button data-year="2013">2013</button>
    <button data-year="2014">2014</button>
    <button data-year="2015">2015</button>
    <button data-year="2016">2016</button>
    <button data-year="2017">2017</button>
    <button data-year="2018">2018</button>
    <button data-year="2019">2019</button>
    <button data-year="2020">2020</button>
    <button data-year="2021">2021</button>
    <button data-year="2022">2022</button>
    <button data-year="2023">2023</button>
    <button data-year="2024">2024</button>
    <button data-year="2025">2025</button>
    <button data-year="2026">2026</button>
  </div>

  <div class="filter-row">
    
    <select id="prefFilter">
      <option value="">すべての都道府県</option>
    </select>

    <select id="cityFilter" disabled>
      <option value="">すべての市区町村</option>
    </select>
    
  </div>

  <div id="listBody"></div>
</div>

<div id="aboutPanel" class="list-panel">
  <div class="about-header">
    <span>about</span>
    <button id="aboutClose" class="close-btn">×</button>
  </div>
  <div id="aboutBody"></div>
</div>

// 検索欄
<div id="searchBox">
  <div class="search-wrapper">
    <input id="searchInput" type="text" placeholder="店名で検索">
    <button id="clearBtn" type="button">×</button>
  </div>
  <div id="searchResults"></div>
</div>

//js読込
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="map.js"></script>
<script src="order.js"></script>
<script src="points.js"></script>
<script src="search.js"></script>
<script src="list.js"></script>
</body>
</html>
